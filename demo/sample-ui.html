<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #eef1f6;
  }
  .screen {
    width: 420px;
    padding: 40px 36px 44px;
    background: #ffffff;
  }
  .brand { font-size: 22px; font-weight: 700; color: #3b5bfd; letter-spacing: -0.3px; }
  h1 { font-size: 26px; color: #101828; margin: 28px 0 6px; letter-spacing: -0.5px; }
  .sub { font-size: 15px; color: #667085; margin-bottom: 30px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #344054; margin: 18px 0 7px; }
  .field {
    width: 100%; height: 46px; border: 1px solid #d0d5dd; border-radius: 9px;
    padding: 0 14px; font-size: 15px; color: #98a2b3; line-height: 46px;
  }
  .row { display: flex; justify-content: space-between; align-items: center; margin: 18px 0 26px; }
  .remember { font-size: 13px; color: #475467; }
  .forgot { font-size: 13px; color: #3b5bfd; font-weight: 600; }
  .btn {
    width: 100%; height: 48px; background: #3b5bfd; color: #fff; border-radius: 9px;
    font-size: 16px; font-weight: 600; text-align: center; line-height: 48px;
  }
  .footer { text-align: center; font-size: 14px; color: #667085; margin-top: 22px; }
  .footer b { color: #3b5bfd; }
</style>
</head>
<body>
  <div class="screen">
    <div class="brand">Acme</div>
    <h1>Welcome Back</h1>
    <div class="sub">Sign in to continue to your account</div>

    <label>Email Address</label>
    <div class="field">Enter your email</div>

    <label>Password</label>
    <div class="field">Enter your password</div>

    <div class="row">
      <span class="remember">Remember me</span>
      <span class="forgot">Forgot Password</span>
    </div>

    <div class="btn">Sign In</div>

    <div class="footer">Don't have an account? <b>Sign Up</b></div>
  </div>
</body>
</html>
